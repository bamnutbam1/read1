<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบอ่านออเดอร์ครัว - Krua Oil Oil</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #4ade80; 
            --primary-dark: #22c55e;
            --danger: #f87171;
            --text: #f3f4f6;
            --line-green: #06C755;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .text-box {
            width: 100%;
            flex: 1;
            min-height: 250px;
            background-color: var(--surface);
            color: var(--text);
            border: 2px solid #333;
            border-radius: 16px;
            padding: 20px;
            font-family: 'Prompt', sans-serif;
            font-size: 22px;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-box:focus {
            border-color: var(--primary);
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Prompt', sans-serif;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-paste { background-color: #374151; color: white; }
        .btn-clear { background-color: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .settings {
            background-color: var(--surface);
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .settings label { font-size: 18px; }

        input[type="range"] { flex: 1; accent-color: var(--primary); }

        .play-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-play {
            width: 100%;
            background: #333;
            color: var(--primary);
            font-size: 20px;
            border: 1px solid var(--primary);
        }

        .btn-line {
            width: 100%;
            background: linear-gradient(135deg, var(--line-green), #05a546);
            color: white;
            font-size: 24px;
            font-weight: 700;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(6, 199, 85, 0.3);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            transition: all 0.3s;
            opacity: 0;
            z-index: 1000;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🗣️ อ่านออเดอร์ส่งเข้า LINE</h1>
        </div>

        <textarea id="orderText" class="text-box" placeholder="วางออเดอร์ที่นี่..."></textarea>

        <div class="toolbar">
            <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 วาง</button>
            <button class="btn btn-clear" onclick="clearText()">🗑️ ล้าง</button>
        </div>

        <div class="settings">
            <label>🏃 ความเร็ว:</label>
            <input type="range" id="speedRate" min="0.5" max="1.5" step="0.1" value="1.0">
            <span id="speedValue">1.0x</span>
        </div>

        <div class="play-container">
            <button id="playBtn" class="btn btn-play" onclick="togglePreview()">🔊 ลองฟังก่อน</button>
            <button id="shareBtn" class="btn btn-line" onclick="generateAndShareAudio()">💬 ส่งออเดอร์เข้า LINE</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const textInput = document.getElementById('orderText');
        const speedRate = document.getElementById('speedRate');
        const speedValue = document.getElementById('speedValue');
        let synth = window.speechSynthesis;

        speedRate.addEventListener('input', () => speedValue.textContent = speedRate.value + 'x');

        function clearText() {
            textInput.value = '';
            synth.cancel();
            textInput.focus();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) textInput.value = text;
            } catch (err) {
                showToast('แตะค้างที่กล่องข้อความแล้วเลือก "วาง"');
            }
        }

        function cleanTextForSpeech(rawText) {
            let lines = rawText.split('\n');
            let speechParts = [];
            for (let line of lines) {
                line = line.trim();
                if (!line || line.startsWith('🍳') || line.startsWith('👤') || line.startsWith('─')) continue;
                line = line.replace(/^(\d+)\.\s*/, 'รายการที่ $1, ').replace(/[×xX]\s*(\d+)/, '$1 ที่').replace('📝', 'หมายเหตุ');
                speechParts.push(line);
            }
            return speechParts.length === 0 ? rawText : speechParts.join('. '); 
        }

        // ฟังตัวอย่างในเครื่อง
        function togglePreview() {
            if (synth.speaking) { synth.cancel(); return; }
            const textToSpeak = cleanTextForSpeech(textInput.value);
            if (!textToSpeak.trim()) return showToast('⚠️ ใส่ข้อความก่อน');
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'th-TH';
            utterance.rate = parseFloat(speedRate.value);
            synth.speak(utterance);
        }

        // ส่งเข้า LINE (แชร์ลิงก์เสียง)
        async function generateAndShareAudio() {
            const rawText = textInput.value.trim();
            if (!rawText) return showToast('⚠️ กรุณาใส่ข้อความก่อน');

            const textToSpeak = cleanTextForSpeech(rawText).substring(0, 200);
            const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=th&client=tw-ob&q=${encodeURIComponent(textToSpeak)}`;

            try {
                if (navigator.share) {
                    await navigator.share({
                        title: 'ออเดอร์ครัวใหม่',
                        text: '🔊 คลิกเพื่อฟังออเดอร์: ',
                        url: audioUrl
                    });
                } else {
                    const lineShareUrl = `https://line.me/R/msg/text/?🔊 คลิกเพื่อฟังออเดอร์ครัว: %0A${encodeURIComponent(audioUrl)}`;
                    window.open(lineShareUrl, '_blank');
                }
            } catch (err) {
                console.log('User cancelled');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
