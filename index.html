<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบอ่านออเดอร์ครัว - Krua Oil Oil</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #4ade80; 
            --primary-dark: #22c55e; --danger: #f87171; --text: #f3f4f6; --line-green: #06C755;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; padding: 20px; align-items: center; }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; flex: 1; }

        .header { text-align: center; margin-bottom: 10px; }
        .header h1 { font-size: 28px; font-weight: 700; color: var(--primary); }

        .text-box { width: 100%; flex: 1; min-height: 250px; background-color: var(--surface); color: var(--text); border: 2px solid #333; border-radius: 16px; padding: 20px; font-size: 22px; line-height: 1.6; resize: none; outline: none; transition: border-color 0.3s; }
        .text-box:focus { border-color: var(--primary); }

        .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { border: none; border-radius: 12px; padding: 15px; font-family: 'Prompt', sans-serif; font-size: 18px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }

        .btn-paste { background-color: #374151; color: white; }
        .btn-clear { background-color: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .settings { background-color: var(--surface); padding: 15px 20px; border-radius: 16px; display: flex; align-items: center; gap: 15px; }
        .settings label { font-size: 18px; }
        input[type="range"] { flex: 1; accent-color: var(--primary); }

        .play-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        
        .btn-play { width: 100%; background: #333; color: var(--primary); font-size: 20px; border: 1px solid var(--primary); }
        .btn-play.playing { background: var(--danger); color: white; border-color: var(--danger); }
        
        .btn-line { width: 100%; background: linear-gradient(135deg, var(--line-green), #05a546); color: white; font-size: 24px; font-weight: 700; padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(6, 199, 85, 0.3); }
        .btn-line:disabled { filter: grayscale(100%); cursor: not-allowed; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: #333; color: white; padding: 12px 24px; border-radius: 30px; transition: all 0.3s; opacity: 0; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* กล่องแจ้งเตือนพนักงานเมื่อเปิดจาก LINE */
        #receiverAlert { display: none; background: rgba(74, 222, 128, 0.2); border: 1px solid var(--primary); padding: 15px; border-radius: 12px; text-align: center; color: var(--primary); font-weight: 700; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🗣️ อ่านออเดอร์ส่งเข้า LINE</h1>
        </div>

        <div id="receiverAlert">🔔 ได้รับออเดอร์ใหม่! กดปุ่มฟังเสียงด้านล่างได้เลย</div>

        <textarea id="orderText" class="text-box" placeholder="วางออเดอร์ที่นี่..."></textarea>

        <div class="toolbar">
            <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 วาง</button>
            <button class="btn btn-clear" onclick="clearText()">🗑️ ล้าง/หยุดเสียง</button>
        </div>

        <div class="settings">
            <label>🏃 ความเร็ว:</label>
            <input type="range" id="speedRate" min="0.5" max="1.5" step="0.1" value="1.0">
            <span id="speedValue">1.0x</span>
        </div>

        <div class="play-container">
            <button id="playBtn" class="btn btn-play" onclick="togglePlay()">🔊 กดเพื่อฟังเสียง</button>
            <button id="shareBtn" class="btn btn-line" onclick="shareToLine()">💬 แชร์ออเดอร์เข้า LINE</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const textInput = document.getElementById('orderText');
        const speedRate = document.getElementById('speedRate');
        const speedValue = document.getElementById('speedValue');
        const playBtn = document.getElementById('playBtn');
        let synth = window.speechSynthesis;
        let isPlaying = false;

        speedRate.addEventListener('input', () => speedValue.textContent = speedRate.value + 'x');

        // เมื่อหน้าเว็บโหลด ให้เช็คว่ามีออเดอร์แนบมากับลิงก์หรือไม่ (สำหรับพนักงานเปิดดู)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const incomingOrder = params.get('order');
            if (incomingOrder) {
                textInput.value = decodeURIComponent(incomingOrder);
                document.getElementById('receiverAlert').style.display = 'block';
            }
        };

        function clearText() {
            textInput.value = '';
            stopSpeech();
            textInput.focus();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) textInput.value = text;
            } catch (err) {
                showToast('แตะค้างที่กล่องข้อความแล้วเลือก "วาง"');
            }
        }

        // ฟังก์ชันทำความสะอาดข้อความและหั่นเป็นประโยคย่อย
        function cleanAndChunkText(rawText) {
            let lines = rawText.split('\n');
            let speechParts = [];
            for (let line of lines) {
                line = line.trim();
                if (!line || line.startsWith('🍳') || line.startsWith('👤') || line.startsWith('─')) continue;
                line = line.replace(/^(\d+)\.\s*/, 'รายการที่ $1, ').replace(/[×xX]\s*(\d+)/, '$1 ที่').replace('📝', 'หมายเหตุ');
                speechParts.push(line);
            }
            return speechParts.length === 0 ? rawText.split('\n') : speechParts; 
        }

        // ระบบอ่านเสียงแบบใหม่ ป้องกันเสียงค้างโดยการอ่านทีละประโยค
        function togglePlay() {
            if (isPlaying || synth.speaking) {
                stopSpeech();
                return;
            }

            const rawText = textInput.value.trim();
            if (!rawText) return showToast('⚠️ ใส่ข้อความก่อน');

            const sentences = cleanAndChunkText(rawText);
            let currentIndex = 0;

            isPlaying = true;
            playBtn.innerHTML = '⏹️ หยุดฟัง';
            playBtn.classList.add('playing');

            function speakNextSentence() {
                if (currentIndex < sentences.length && isPlaying) {
                    const utterance = new SpeechSynthesisUtterance(sentences[currentIndex]);
                    utterance.lang = 'th-TH';
                    utterance.rate = parseFloat(speedRate.value);
                    
                    utterance.onend = () => {
                        currentIndex++;
                        speakNextSentence();
                    };
                    
                    utterance.onerror = (e) => {
                        console.error("Speech Error", e);
                        stopSpeech();
                    };

                    synth.speak(utterance);
                } else {
                    stopSpeech(); // อ่านจบหมดแล้ว
                }
            }

            speakNextSentence();
        }

        function stopSpeech() {
            synth.cancel();
            isPlaying = false;
            playBtn.innerHTML = '🔊 กดเพื่อฟังเสียง';
            playBtn.classList.remove('playing');
        }

        // ระบบแชร์เข้า LINE แบบแนบข้อมูลเข้าลิงก์เว็บตัวเอง (ทะลุลิมิต 200 ตัวอักษร)
        async function shareToLine() {
            const rawText = textInput.value.trim();
            if (!rawText) return showToast('⚠️ กรุณาใส่ข้อความออเดอร์ก่อน');

            const shareBtn = document.getElementById('shareBtn');
            shareBtn.innerHTML = '⏳ กำลังสร้างลิงก์...';
            shareBtn.disabled = true;

            try {
                // ดึง URL หน้าเว็บปัจจุบัน (ตัด Parameter เก่าออกถ้ามี)
                const baseUrl = window.location.href.split('?')[0];
                // แนบข้อความออเดอร์ไปกับ URL
                const appUrlWithOrder = baseUrl + '?order=' + encodeURIComponent(rawText);

                // ส่ง URL ของเราไปย่อให้สั้นลง
                const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(appUrlWithOrder)}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const shortUrl = await response.text();

                // แชร์ลิงก์เข้า LINE
                if (navigator.share) {
                    await navigator.share({
                        title: 'ออเดอร์ครัว',
                        text: '👨‍🍳 ออเดอร์มาใหม่! กดเปิดแล้วฟังได้เลย: ',
                        url: shortUrl
                    });
                } else {
                    const lineShareUrl = `https://line.me/R/msg/text/?👨‍🍳 ออเดอร์มาใหม่! กดเปิดแล้วฟังได้เลย:%0A${encodeURIComponent(shortUrl)}`;
                    window.open(lineShareUrl, '_blank');
                }
            } catch (err) {
                console.error(err);
                showToast('❌ เกิดข้อผิดพลาดตอนสร้างลิงก์ ลองใหม่อีกครั้ง');
            } finally {
                shareBtn.innerHTML = '💬 แชร์ออเดอร์เข้า LINE';
                shareBtn.disabled = false;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
