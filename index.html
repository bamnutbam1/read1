<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบแปลงออเดอร์ภาพ - Krua Oil Oil</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #fbbf24; 
            --primary-dark: #f59e0b; --danger: #f87171; --text: #f3f4f6; --line-green: #06C755;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; padding: 20px; align-items: center; }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; flex: 1; }

        .header { text-align: center; margin-bottom: 5px; }
        .header h1 { font-size: 26px; font-weight: 700; color: var(--primary); }

        .box-title { font-size: 16px; color: #9ca3af; margin-bottom: -10px; padding-left: 5px; }
        
        #inputText { width: 100%; min-height: 100px; background-color: var(--surface); color: var(--text); border: 2px solid #333; border-radius: 12px; padding: 15px; font-size: 16px; resize: none; outline: none; transition: border-color 0.3s; font-family: 'Prompt', sans-serif;}
        #inputText:focus { border-color: var(--primary); }
        
        #outputText { width: 100%; min-height: 250px; background-color: #27272a; border: 2px solid var(--primary); border-radius: 12px; padding: 15px; font-size: 28px; line-height: 1.6; color: white; resize: none; outline: none; text-align: left; font-family: 'Prompt', sans-serif; }

        .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { border: none; border-radius: 12px; padding: 12px; font-family: 'Prompt', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }

        .btn-paste { background-color: #374151; color: white; }
        .btn-clear { background-color: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .action-container { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; margin-bottom: 20px; }
        .btn-convert { width: 100%; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #000; font-size: 20px; font-weight: 700; padding: 15px; border-radius: 12px; }
        .btn-line { width: 100%; background: linear-gradient(135deg, var(--line-green), #05a546); color: white; font-size: 20px; font-weight: 700; padding: 15px; border-radius: 12px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: #333; color: white; padding: 12px 24px; border-radius: 30px; transition: all 0.3s; opacity: 0; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🍳 ล่ามแปลภาษาครัว</h1>
        </div>

        <div class="box-title">📥 วางออเดอร์ภาษาไทย:</div>
        <textarea id="inputText" placeholder="วางออเดอร์ตรงนี้..."></textarea>

        <div class="toolbar">
            <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 วางข้อความ</button>
            <button class="btn btn-clear" onclick="clearText()">🗑️ ล้างข้อมูล</button>
        </div>

        <div class="box-title">✨ ออเดอร์สำหรับพนักงาน (ดูง่าย สบายตา):</div>
        <textarea id="outputText" placeholder="ผลลัพธ์จะแสดงตรงนี้..." readonly></textarea>

        <div class="action-container">
            <button class="btn btn-convert" onclick="convertToEmoji()">🪄 แปลงเป็นภาพ+ข้อความ</button>
            <button class="btn btn-line" onclick="shareToLine()">💬 ส่งเข้า LINE</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');

        // คลังคำศัพท์ฉบับครอบจักรวาลร้านอาหารตามสั่ง
        const emojiDictionary = {
            // หมวดเมนูข้าวไข่
            "ข้าวไข่เจียวหมูสับ": "🍚🥚🐷",
            "ข้าวไข่ดาว 2 ฟอง": "🍚🍳🍳",
            
            // หมวดต้ม/สุกี้/เส้น
            "ต้มยำทะเล": "🍲🍋🌊", "ต้มยำกุ้ง": "🍲🍋🦐", "ต้มยำรวมมิตร": "🍲🍋🐙",
            "สุกี้น้ำ": "🍲💧", "สุกี้แห้ง": "🍲🔥",
            "ผัดซีอิ๊ว": "🍜🤎", "ราดหน้า": "🍜🍲", "มาม่าผัด": "🍜🔥", "ผัดขี้เมา": "🍝🌶️🌿",
            
            // หมวดข้าวผัด
            "ข้าวผัดต้มยำ": "🍚🍋🌶️", "ข้าวผัดกุ้ง": "🍚🔥🦐", "ข้าวผัดหมู": "🍚🔥🐷",
            "ข้าวผัดทะเล": "🍚🔥🌊", "ข้าวผัดปู": "🍚🔥🦀", "ข้าวผัดรวมมิตร": "🍚🔥🐙",
            "ข้าวผัด": "🍚🔥",

            // หมวดกะเพรา
            "กระเพราไข่เยี่ยวม้า": "🌿🥚🖤", "กะเพราไข่เยี่ยวม้า": "🌿🥚🖤",
            "กระเพราหน่อไม้ดอง": "🌿🎋", "กะเพราหน่อไม้ดอง": "🌿🎋",
            "กระเพราหมูกรอบ": "🌿🥓", "กะเพราหมูกรอบ": "🌿🥓",
            "กระเพราหมูชิ้น": "🌿🐖", "กะเพราหมูชิ้น": "🌿🐖",
            "กระเพราหมูสับ": "🌿🐷", "กะเพราหมูสับ": "🌿🐷",
            "กระเพราไก่": "🌿🐔", "กะเพราไก่": "🌿🐔",
            "กระเพราเนื้อ": "🌿🐂", "กะเพราเนื้อ": "🌿🐂",
            "กระเพราทะเล": "🌿🌊", "กะเพราทะเล": "🌿🌊",
            "กระเพรากุ้ง": "🌿🦐", "กะเพรากุ้ง": "🌿🦐",
            "กระเพราหมึก": "🌿🦑", "กะเพราหมึก": "🌿🦑",
            "กระเพรารวมมิตร": "🌿🐙", "กะเพรารวมมิตร": "🌿🐙",
            "กระเพรา": "🌿", "กะเพรา": "🌿",

            // หมวดพริกแกง
            "พริกแกงหมูใส่ถั่วฝักยาว": "🥘🌶️🐖🎋",
            "พริกแกงกุ้งหมึก": "🥘🌶️🦐🦑",
            "พริกแกงหมูกรอบ": "🥘🌶️🥓",
            "พริกแกงหมูชิ้น": "🥘🌶️🐖",
            "พริกแกงไก่": "🥘🌶️🐔",
            "พริกแกงเนื้อ": "🥘🌶️🐂",
            "พริกแกงทะเล": "🥘🌶️🌊",
            "ผัดพริกแกง": "🥘🌶️", "พริกแกง": "🥘🌶️",

            // หมวดกระเทียม
            "หมูสับกระเทียม": "🐷🧄", "หมูกรอบกระเทียม": "🥓🧄",
            "หมูกระเทียม": "🐖🧄", "ไก่กระเทียม": "🐔🧄",
            "เนื้อกระเทียม": "🐂🧄", "กุ้งกระเทียม": "🦐🧄",
            "หมึกกระเทียม": "🦑🧄", "ทะเลกระเทียม": "🌊🧄",
            "กระเทียมพริกไทย": "🧄🖤", "กระเทียม": "🧄",

            // หมวดผัดเผ็ด/พริกเผา/พริกเกลือ/พริกสด
            "หมูกรอบคั่วพริกเกลือ": "🥓🧂🌶️", "คั่วพริกเกลือ": "🧂🌶️",
            "หมูกรอบผัดพริกเผา": "🥓🌶️🥫", "ผัดพริกเผา": "🌶️🥫", "พริกเผา": "🌶️🥫",
            "ผัดพริกหยวก": "🫑🔥", "พริกหยวก": "🫑",
            "ผัดพริกสด": "🌶️🔥", "ผัดฉ่า": "🌿🔥🌶️",
            
            // หมวดผัก/จิปาถะ
            "ผัดตับดอกหอม": "🥩🌱", "ผัดผักรวม": "🥦🥕🥬",
            "คะน้าหมูกรอบ": "🥬🥓", "ผัดคะน้า": "🥬🔥", "แขนงหมูกรอบ": "🥬🥓",
            "ผัดผักบุ้ง": "🌿🔥", "ผัดกะหล่ำปลี": "🥬🔥",
            "ผักผงกะหรี่": "🟡🥘", "ผัดผงกะหรี่": "🟡🥘",
            
            // หมวดไข่ดาว/ไข่เจียว/ไข่พิเศษ
            "ไข่ดาวไม่สุก": "🍳💦", "ไข่ดาวสุก": "🍳✅", "ข้าวไข่ดาว": "🍚🍳",
            "ไข่ดาว": "🍳", "ไข่เจียว": "🥚", "ไข่เค็ม": "🥚🧂", "ไข่เยี่ยวม้า": "🥚🖤",

            // วัตถุดิบพื้นฐาน (เผื่อลูกค้าพิมพ์มาสั้นๆ)
            "หมูกรอบ": "🥓", "หมูชิ้น": "🐖", "หมูสับ": "🐷",
            "ไก่": "🐔", "เนื้อ": "🐂", "กุ้ง": "🦐", "ปลาหมึก": "🦑", "หมึก": "🦑", 
            "ทะเล": "🌊", "ปลากระป๋อง": "🥫🐟", "หมูยอ": "🍖", "แหนม": "🥩🍋",
            "เครื่องใน": "🫀", "ตับ": "🥩", "ไส้กรอก": "🌭",

            // คำสั่งพิเศษ
            "เผ็ดมาก": "🌶️🌶️🌶️", "เผ็ดน้อย": "🌶️", "ไม่เผ็ด": "🚫🌶️",
            "พิเศษ": "⭐", "ธรรมดา": "⚪",
            "กับข้าว": "🍽️", "ราดข้าว": "🍛",
            "ใส่ถ้วย": "🥣", "ใส่กล่อง": "📦", "กลับบ้าน": "🛍️"
        };

        function clearText() {
            inputText.value = '';
            outputText.value = '';
            inputText.focus();
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    inputText.value = text;
                    convertToEmoji(); 
                }
            } catch (err) {
                showToast('แตะค้างที่กล่องด้านบนแล้วเลือก "วาง"');
            }
        }

        function convertToEmoji() {
            let text = inputText.value.trim();
            if (!text) return;

            let lines = text.split('\n');
            let finalOutput = [];
            
            // เรียงคำจากยาวไปสั้น เพื่อให้แปลแม่นยำที่สุด
            const sortedKeys = Object.keys(emojiDictionary).sort((a, b) => b.length - a.length);

            for (let line of lines) {
                line = line.trim();
                // ข้ามบรรทัดที่ไม่เกี่ยวกับออเดอร์
                if (!line || line.startsWith('─') || line.startsWith('💰') || line.startsWith('รวม')) continue;

                let qty = "1";
                // ดึงตัวเลขจำนวน x2 หรือ 2 กล่อง
                let qtyMatch = line.match(/[xX×]\s*(\d+)/) || line.match(/(\d+)\s*(ที่|กล่อง|ห่อ)/);
                if (qtyMatch) qty = qtyMatch[1];

                let emojis = [];
                for (let key of sortedKeys) {
                    if (line.includes(key)) {
                        emojis.push(`${emojiDictionary[key]}(${key})`);
                        line = line.replace(new RegExp(key, 'g'), '');
                    }
                }

                if (emojis.length > 0) {
                    finalOutput.push(`x${qty}   ${emojis.join(' ')}`);
                }
            }

            outputText.value = finalOutput.length === 0 ? "❓ ไม่พบเมนูในระบบ" : finalOutput.join('\n\n');
            showToast('🪄 แปลงเสร็จแล้ว!');
        }

        function shareToLine() {
            const finalOrder = outputText.value.trim();
            if (!finalOrder || finalOrder === "❓ ไม่พบเมนูในระบบ") {
                showToast('⚠️ แปลงข้อความก่อนครับ');
                return;
            }
            const messageToSend = `👨‍🍳 ออเดอร์ครัวจ้า!\n\n${finalOrder}`;
            try {
                const lineShareUrl = `https://line.me/R/msg/text/?${encodeURIComponent(messageToSend)}`;
                window.open(lineShareUrl, '_blank');
            } catch (err) {
                showToast('❌ เปิด LINE ไม่ได้');
            }
        }

        inputText.addEventListener('input', convertToEmoji);
    </script>
</body>
</html>
